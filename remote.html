<!DOCTYPE html>

<html>

<head>

    <title>Sigma Robot Remote</title>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>

        body{

            background:#0f172a;

            color:white;

            font-family:Arial;

            text-align:center;

            margin:0;
        }

        h1{

            padding:20px;
        }

        video{

            width:80vw;

            border-radius:20px;

            border:4px solid #38bdf8;

            margin-top:20px;
        }

        .controls{

            margin-top:30px;
        }

        button{

            width:100px;
            height:100px;

            margin:10px;

            font-size:35px;

            border:none;

            border-radius:20px;

            background:#1e293b;

            color:white;

            cursor:pointer;
        }

        button:hover{

            background:#38bdf8;
        }

    </style>

</head>

<body>

<h1>🚀 SIGMA ROBOT REMOTE</h1>

<video
    id="video"
    autoplay
    playsinline
    muted
></video>

<div class="controls">

    <div>

        <button onmousedown="send('F')">↑</button>

    </div>

    <div>

        <button onmousedown="send('L')">←</button>

        <button onmousedown="send('S')">■</button>

        <button onmousedown="send('R')">→</button>

    </div>

    <div>

        <button onmousedown="send('B')">↓</button>

    </div>

</div>

<script>

const SIGNAL_SERVER =
"https://sigma-webrtc.onrender.com";

const socket = io(SIGNAL_SERVER);

const pc = new RTCPeerConnection({

    iceServers:[

        {
            urls:[
                "stun:stun.l.google.com:19302"
            ]
        }
    ]
});

let dataChannel;

// ---------------- SOCKET CONNECT ---------------- //

socket.on("connect", async () => {

    console.log("Connected");

    socket.emit("register", {

        type:"browser"
    });

    dataChannel =
        pc.createDataChannel("commands");

    pc.ontrack = (event) => {

        document.getElementById(
            "video"
        ).srcObject = event.streams[0];
    };

    const offer =
        await pc.createOffer();

    await pc.setLocalDescription(
        offer
    );

    socket.emit("signal", {

        target:"robot",

        type:"offer",

        sdp:pc.localDescription.sdp
    });
});

// ---------------- SIGNALS ---------------- //

socket.on("signal", async (data) => {

    if(data.type == "answer"){

        await pc.setRemoteDescription({

            type:"answer",

            sdp:data.sdp
        });
    }
});

// ---------------- COMMANDS ---------------- //

function send(cmd){

    if(dataChannel.readyState === "open"){

        dataChannel.send(cmd);
    }
}

</script>

</body>

</html>
